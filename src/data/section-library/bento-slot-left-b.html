<div class="h-full flex flex-col justify-between p-8" style="background:var(--color-surface);border:1px solid color-mix(in srgb,var(--color-text) 10%,transparent)">
  <div class="flex flex-col gap-5">
    <span class="text-xs font-semibold tracking-widest uppercase" style="color:var(--color-accent)">Eyebrow Label</span>
    <div>
      <h1 class="font-bold leading-none mb-2" style="font-size:clamp(1.8rem,3vw,2.8rem);color:var(--color-text);font-family:var(--font-heading)">Headline Part One</h1>
      <h1 class="font-bold leading-none" style="font-size:clamp(1.8rem,3vw,2.8rem);color:var(--color-accent);font-family:var(--font-heading)">Accent Part Two.</h1>
    </div>
    <p class="text-base leading-relaxed" style="color:color-mix(in srgb,var(--color-text) 65%,transparent)">
      Subline — one outcome-focused sentence, max 12 words, specific.
    </p>
    <!-- Progress bars (3 metrics with label + bar + value) -->
    <div class="flex flex-col gap-3 mt-2">
      <div>
        <div class="flex justify-between text-xs mb-1" style="color:color-mix(in srgb,var(--color-text) 55%,transparent)">
          <span>Metric label 1</span><span style="color:var(--color-accent)">00%</span>
        </div>
        <div class="w-full h-1" style="background:color-mix(in srgb,var(--color-text) 10%,transparent)">
          <div class="h-1" style="width:00%;background:var(--color-accent)"></div>
        </div>
      </div>
      <div>
        <div class="flex justify-between text-xs mb-1" style="color:color-mix(in srgb,var(--color-text) 55%,transparent)">
          <span>Metric label 2</span><span style="color:var(--color-text)">000+</span>
        </div>
        <div class="w-full h-1" style="background:color-mix(in srgb,var(--color-text) 10%,transparent)">
          <div class="h-1" style="width:00%;background:var(--color-text)"></div>
        </div>
      </div>
      <div>
        <div class="flex justify-between text-xs mb-1" style="color:color-mix(in srgb,var(--color-text) 55%,transparent)">
          <span>Metric label 3</span><span style="color:var(--color-text)">00+</span>
        </div>
        <div class="w-full h-1" style="background:color-mix(in srgb,var(--color-text) 10%,transparent)">
          <div class="h-1" style="width:00%;background:var(--color-text)"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="flex flex-col gap-3 mt-8">
    <button class="inline-flex items-center gap-2 px-6 py-3 font-semibold text-sm w-fit" style="background:var(--color-accent);color:var(--color-background)">
      → Primary CTA (verb + benefit)
    </button>
    <p class="text-xs" style="color:color-mix(in srgb,var(--color-text) 40%,transparent)">Micro-copy — risk reduction, max 5 words</p>
  </div>
</div>
