<div class="h-full flex flex-col justify-between p-8" style="background:var(--color-surface);border:1px solid color-mix(in srgb,var(--color-text) 10%,transparent)">
  <div class="flex flex-col gap-6">
    <span class="text-xs font-semibold tracking-widest uppercase" style="color:var(--color-accent)">Eyebrow Label</span>
    <div>
      <h1 class="font-bold leading-none mb-2" style="font-size:clamp(2.2rem,4.5vw,3.75rem);color:var(--color-text);font-family:var(--font-heading)">Headline Part One</h1>
      <h1 class="font-bold leading-none" style="font-size:clamp(2.2rem,4.5vw,3.75rem);color:var(--color-accent);font-family:var(--font-heading)">Accent Part Two</h1>
    </div>
    <p class="text-base leading-relaxed max-w-sm" style="color:color-mix(in srgb,var(--color-text) 70%,transparent)">
      One outcome-focused sentence. Max 12 words. Specific, no fluff.
    </p>
  </div>
  <div class="flex flex-col gap-3 mt-8">
    <div class="flex flex-wrap gap-3">
      <button class="inline-flex items-center gap-2 px-6 py-3 rounded-lg font-semibold text-sm transition-opacity hover:opacity-90" style="background:var(--color-accent);color:var(--color-background)">
        Primary CTA Label
      </button>
      <button class="inline-flex items-center gap-2 px-6 py-3 rounded-lg font-semibold text-sm transition-opacity hover:opacity-80" style="border:1.5px solid color-mix(in srgb,var(--color-text) 25%,transparent);color:var(--color-text)">
        Secondary CTA
      </button>
    </div>
    <p class="text-xs" style="color:color-mix(in srgb,var(--color-text) 40%,transparent)">Unverbindlich · Kostenlose Erstberatung</p>
  </div>
</div>
