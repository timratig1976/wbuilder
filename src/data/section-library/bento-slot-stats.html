<div class="h-full flex flex-col p-6">
  <div class="text-xs font-semibold tracking-widest uppercase mb-5" style="color:color-mix(in srgb,var(--color-text) 45%,transparent)">Section headline (2–3 words)</div>
  <div class="flex flex-col flex-1 justify-between gap-0">
    <div class="py-4" style="border-bottom:1px solid color-mix(in srgb,var(--color-text) 10%,transparent)">
      <div class="text-xs mb-1" style="color:color-mix(in srgb,var(--color-text) 55%,transparent)">KPI label 1 (short, specific)</div>
      <div class="font-bold tabular-nums leading-none" style="font-size:2rem;color:var(--color-accent);font-family:var(--font-heading)">00%</div>
    </div>
    <div class="py-4" style="border-bottom:1px solid color-mix(in srgb,var(--color-text) 10%,transparent)">
      <div class="text-xs mb-1" style="color:color-mix(in srgb,var(--color-text) 55%,transparent)">KPI label 2 (short, specific)</div>
      <div class="font-bold tabular-nums leading-none" style="font-size:2rem;color:var(--color-text);font-family:var(--font-heading)">000+</div>
    </div>
    <div class="py-4">
      <div class="text-xs mb-1" style="color:color-mix(in srgb,var(--color-text) 55%,transparent)">KPI label 3 (short, specific)</div>
      <div class="font-bold tabular-nums leading-none" style="font-size:2rem;color:var(--color-text);font-family:var(--font-heading)">00+</div>
    </div>
  </div>
</div>
