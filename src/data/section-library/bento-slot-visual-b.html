<div class="h-full flex flex-col relative" style="overflow:hidden">
  <img
    src="https://picsum.photos/id/220/800/600"
    alt="Visual description (specific, no generics)"
    style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"
  />
  <!-- Diagonal clip overlay: dark color block bottom-left -->
  <div class="absolute inset-0" style="background:linear-gradient(135deg,color-mix(in srgb,var(--color-background) 85%,transparent) 0%,transparent 55%)"></div>
  <!-- Bottom caption area -->
  <div class="relative mt-auto p-6 flex flex-col gap-1">
    <div class="text-xs font-semibold tracking-widest uppercase mb-2" style="color:var(--color-accent)">Eyebrow (2 words)</div>
    <p class="font-bold leading-tight" style="font-size:clamp(1rem,1.4vw,1.25rem);color:var(--color-text)">Short visual caption — max 8 words.</p>
  </div>
  <!-- Accent corner mark -->
  <div class="absolute top-6 right-6 w-8 h-8 flex items-end justify-end">
    <span class="w-full h-0.5" style="background:var(--color-accent)"></span>
  </div>
</div>
