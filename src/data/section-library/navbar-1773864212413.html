<script>
  (function(){
    var nav = document.getElementById('main-nav');
    if(!nav) return;
    window.addEventListener('scroll', function(){
      if(window.scrollY > 10){
        nav.style.backgroundColor = 'rgba(255,255,255,0.85)';
        nav.style.backdropFilter = 'blur(12px)';
        nav.style.paddingTop = '0.75rem';
        nav.style.paddingBottom = '0.75rem';
      } else {
        nav.style.backgroundColor = 'var(--color-primary)';
        nav.style.backdropFilter = '';
        nav.style.paddingTop = '1.5rem';
        nav.style.paddingBottom = '1.5rem';
      }
    });
  })()
</script>
